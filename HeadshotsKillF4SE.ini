; ============================================================
; HeadshotsKillF4SE - Configuration
; ============================================================
; This file is overwritten when settings are changed in the
; in-game F4SE Menu Framework UI. Edits made here take effect
; on the next game data load (kGameDataReady / kPostLoadGame).

[General]
; Master toggle. When false, the plugin is dormant.
bEnableMod=true
bEnableDebugLogging=false
; Health damage applied to score the kill (default 99999).
fKillDamage=99999

[Victims]
; If false, the player and player teammates are immune to instakill headshots.
bApplyToPlayerAndFollowers=false
; Skip enemies more than this many levels above the player.
iLevelGapThreshold=20
; 0=Skip essentials, 1=Bleedout instead of kill, 2=Ignore essential flag.
iEssentialMode=0

[Chances]
; Per-actor-category base instakill chances (0-100). The caliber modifiers below
; multiply this base value before the dice roll.
fHumanoid=100
fSmallCreature=100
fArmoredCreature=60
fLargeCreature=25
fSuperMutant=20
fDeathclaw=15
fMirelurkQueen=10

[CaliberModifiers]
; Multipliers (0.0+ - usually <=1.5) applied to the base chance based on caliber tier vs target.
; Pistol/Shotgun rounds cannot insta-kill armored or large targets by default.
fPistolVsArmored=0
fShotgunVsArmored=0
fRifleVsArmored=1.0
fLargeRifleVsArmored=1.5
fPistolVsLarge=0
fShotgunVsLarge=0
fRifleVsLarge=0.5
fLargeRifleVsLarge=1.0
fPistolVsPA=0
fShotgunVsPA=0
fRifleVsPA=0
fLargeRifleVsPA=0.4

[Helmet]
bEnableHelmetKnockoff=true
fKnockoffChancePistol=30
fKnockoffChanceRifle=50
fKnockoffChanceShotgun=40
fPAKnockoffChanceRifle=15
fPAKnockoffChanceLargeRifle=30
; Height above the head bone (game units) where the helmet reference is spawned.
; A small offset prevents the helmet from clipping into the skull before physics kick in.
; Default 20 units (~28 cm). Increase if the helmet visibly clips on spawn.
fDropSpawnHeight=20
; 0 = impulse along shot travel, 1 = opposite (helmet flies back from impact). Default 1.
fDropFlyAgainstShot=1
; Extra Z mixed into fly direction before normalize (higher = more arc). Default 0.4.
fDropFlyUpLift=0.4
; Havok impulse magnitude applied to the dropped helmet via ApplyHavokImpulse.
; Higher = flies further/faster. Typical range: 200 (gentle) to 1000 (extreme).
; Direction is opposite to the incoming shot, so the helmet snaps backward/upward.
fDropLinearImpulse=500
fDropAngularImpulse=0.10
; Window (sec) within which subsequent shotgun pellets are grouped with the first hit.
fShotgunPelletGroupWindowSec=0.10

[ArmorScaling]
; Higher values mean better armor reduces the chance more aggressively.
; A value of 200 means a helmet with AR 200 reduces chance to 0%.
fMaxBallisticARThreshold=200
fMaxEnergyARThreshold=200

[Legendary]
; If true, do not insta-kill a legendary enemy that just mutated.
bRespectLegendaryMutation=true
fLegendaryCooldownSeconds=3.0
; Health ratio gain (0-1) above which a legendary actor is considered to have mutated.
fMutationHealthRatioThreshold=0.20

[Lists]
; Comma-separated race EditorIDs to exclude from this mod.
sRaceBlocklist=
; Comma-separated BGSKeyword EditorIDs that immediately exempt the actor.
sKeywordImmune=ActorTypeRobot

[AmmoOverrides]
; Per-ammo user overrides. Keys are "PluginName.esm:EditorID", values are integer Caliber:
;   0 = Excluded, 1 = Pistol, 2 = Shotgun, 3 = Rifle, 4 = LargeRifle
; Populated automatically by the in-game UI when you change a categorization.
